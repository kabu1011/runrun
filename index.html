<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪜 精準鬼腳圖抽籤 (支援10人)</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #fdfdf5; /* 類似紙張顏色 */
            --ink-color: #444; /* 墨水顏色 */
            --path-color: #d9534f; /* 行走時的路徑顏色 */
            --lane-count: 10;
        }
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--paper-bg);
            color: var(--ink-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }

        /* 設定區域 */
        .controls { width: 90%; max-width: 800px; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        textarea { width: 100%; height: 60px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; resize: none; margin-bottom: 10px; }
        button { background: #6366f1; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; margin: 0 5px; transition: 0.2s; }
        button:hover { background: #4f46e5; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* 遊戲主區域 */
        #game-board {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            display: none;
        }

        /* 頂部玩家區域 */
        #players-row { display: flex; width: 100%; justify-content: space-around; position: relative; z-index: 2; margin-bottom: 5px;}
        .player-item { flex: 1; text-align: center; position: relative; }
        .player-item .face { font-size: 20px; border: 2px solid var(--ink-color); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto; background: white; cursor: pointer; }
        .player-item .name { font-size: 12px; margin-top: 5px; background: white; padding: 2px; border-radius: 3px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%; margin-left: auto; margin-right: auto;}

        /* 底部分配結果區域 */
        #results-row { display: flex; width: 100%; justify-content: space-around; margin-top: 10px; position: relative; z-index: 2;}
        .result-item { flex: 1; text-align: center; position: relative; font-size: 14px; color: #d9534f; font-weight: bold; font-family: sans-serif;}

        /* 鬼腳圖核心區域 (線條與標記) */
        #lines-container { height: 450px; position: relative; width: 100%; z-index: 1; margin-top: 10px; }
        
        /* 垂直線 */
        .vertical-line { position: absolute; width: 2px; background: var(--ink-color); top: 0; bottom: 0; }
        /* 橫線 */
        .horizontal-line { position: absolute; height: 2px; background: var(--ink-color); border-radius: 1px; }

        /* 行走的路徑標記 */
        #player-marker { position: absolute; width: 12px; height: 12px; background: var(--path-color); border-radius: 50%; z-index: 10; top: 0; transform: translate(-50%, -50%); opacity: 0; }
        
        /* 動態繪製的路徑段 */
        .path-segment { position: absolute; background: var(--path-color); height: 2px; z-index: 9; border-radius: 1px; }
    </style>
</head>
<body>

<div class="controls">
    <h2>🪜 精準鬼腳圖抽籤系統</h2>
    <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">請輸入 10 個名字（每行或空格分開）：</p>
    <textarea id="namesInput">學生1 學生2 學生3 學生4 學生5 學生6 學生7 學生8 學生9 學生10</textarea>
    <br>
    <button id="generateBtn" onclick="generateBoard()">產生精準圖形</button>
</div>

<div id="game-board">
    <div id="players-row">
        </div>
    <div id="lines-container">
        <div id="path-segments-container"></div>
        <div id="player-marker"></div>
    </div>
    <div id="results-row">
        </div>
</div>

<script>
